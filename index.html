<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$BUBBLE Coin</title>
    <style>
        /* Base Styles */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: black;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #555;
            letter-spacing: -2px;
        }

        .market-cap-container {
            font-size: 1.5rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 40px;
            z-index: 10;
        }

        /* The Bubble */
        .bubble-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 400px;
            width: 400px;
        }

        .bubble {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            position: relative;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255, 255, 255, 0.9) 0%, 
                rgba(255, 255, 255, 0.4) 20%, 
                rgba(173, 216, 230, 0.3) 50%, 
                rgba(255, 182, 193, 0.3) 80%, 
                rgba(138, 43, 226, 0.1) 100%);
            box-shadow: 
                inset 0 0 20px rgba(255, 255, 255, 0.5),
                inset 10px 10px 20px rgba(173, 216, 230, 0.2),
                0 10px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 4s ease-in-out infinite;
        }

        /* Shine effect on the bubble */
        .bubble::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 25%;
            height: 25%;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            filter: blur(2px);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        #mc-value {
            color: #fff;
        }
    </style>
</head>
<body>

    <h1>$BUBBLE</h1>
    
    <div class="market-cap-container">
        Market Cap: $<span id="mc-value">5.52</span>k
    </div>

    <div class="bubble-wrapper">
        <div id="bubble" class="bubble"></div>
    </div>

    <script>
        const mcDisplay = document.getElementById('mc-value');
        const bubble = document.getElementById('bubble');

        const MIN_MC = 5.52;
        const MAX_MC = 7.80;
        const MIN_SIZE = 120; // px
        const MAX_SIZE = 320; // px

        function updateStats() {
            // Generate random MC between 5.52 and 7.80
            const randomMC = (Math.random() * (MAX_MC - MIN_MC) + MIN_MC).toFixed(2);
            
            // Update text
            mcDisplay.innerText = randomMC;

            // Calculate size based on MC percentage
            const percentage = (randomMC - MIN_MC) / (MAX_MC - MIN_MC);
            const newSize = MIN_SIZE + (percentage * (MAX_SIZE - MIN_SIZE));

            // Apply size to bubble
            bubble.style.width = `${newSize}px`;
            bubble.style.height = `${newSize}px`;

            // Randomize next update interval between 800ms and 2500ms
            const nextUpdate = Math.floor(Math.random() * 1700) + 800;
            setTimeout(updateStats, nextUpdate);
        }

        // Initialize
        updateStats();
    </script>
</body>
</html>
